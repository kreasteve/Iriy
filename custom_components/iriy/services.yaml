recalculate:
  name: Neu berechnen
  description: Erzwingt eine sofortige Neuberechnung von ET0 und Defizit.

backfill:
  name: History nachladen
  description: >-
    Verwirft die heutige Bilanz und baut sie aus der Recorder-History neu auf
    (gestriger Tageswert + heutiger Verlauf). Mit days > 0 werden zusaetzlich
    vergangene Tage als ET0-Langzeitstatistik nachgetragen (soweit Daten da sind).
  fields:
    days:
      name: Tage rueckwirkend
      description: Wie viele vergangene Tage als ET0-Statistik nachtragen (0 = nur heute/gestern).
      required: false
      default: 30
      selector:
        number:
          min: 0
          max: 365
          step: 1
          unit_of_measurement: Tage

reset_bucket:
  name: Defizit zuruecksetzen
  description: Setzt das Wasserdefizit auf 0 (z. B. nach manueller Bewaesserung).
  fields:
    zone:
      name: Zone
      description: Name der Zone. Leer = alle Zonen.
      required: false
      selector:
        text:

add_water:
  name: Wasser verbuchen
  description: Zieht eine ausgebrachte Wassermenge (mm) vom Defizit einer Zone ab.
  fields:
    zone:
      name: Zone
      description: Name der Zone.
      required: true
      selector:
        text:
    mm:
      name: Menge (mm)
      description: Ausgebrachte Wassermenge in Millimetern.
      required: true
      selector:
        number:
          min: 0
          max: 100
          step: 0.1
          unit_of_measurement: mm
